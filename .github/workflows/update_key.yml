name: Update Key Every Hour

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate new key
        run: |
          python3 -c "
          import random, string
          chars = string.ascii_lowercase + string.digits
          key = 'bloxstrike_' + ''.join(random.choices(chars, k=12))
          with open('key.txt', 'w') as f:
              f.write(key)
          print('New key:', key)
          "

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add key.txt
          git commit -m "Key update: $(date -u '+%Y-%m-%d %H:%M')"
          git push
